services:
  # MQTT Broker - trung gian nhận và phân phối message
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # Database lưu trữ time-series data
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=iot-lab
      - DOCKER_INFLUXDB_INIT_BUCKET=iot_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=iot-token-123
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # Giả lập cảm biến IoT, publish data lên MQTT
  iot-sensor-simulator:
    build: ./iot-sensor-simulator
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    depends_on:
      - mosquitto

  # Giám sát tài nguyên hệ thống (CPU, RAM, disk), publish lên MQTT
  system-monitor:
    build: ./system_monitor
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=system/info
      - DEVICE_ID=system-monitor-01
      - PUBLISH_INTERVAL=5
    #depends_on đảm bảo thứ tự khởi động
    depends_on:
      - mosquitto

  # Nhận message từ MQTT, xử lý và lưu vào InfluxDB
  processor:
    build: ./processor
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=#
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=iot-token-123
      - INFLUXDB_ORG=iot-lab
      - INFLUXDB_BUCKET=iot_data
    depends_on:
      - mosquitto
      - influxdb

  # Dashboard trực quan hóa dữ liệu từ InfluxDB
  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb

volumes:
  influxdb_data:
  grafana_data:
